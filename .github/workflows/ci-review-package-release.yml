name: CI Review Package Release

on:
  push:

permissions:
  contents: write

jobs:
  review:
    name: Static Review (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability --std=c++17 --library=qt --error-exitcode=1 --inline-suppr --suppress=missingIncludeSystem --suppress=unknownMacro --quiet "Visualization for Hexo/src" "Visualization for Hexo/main.cpp"

  package:
    name: Build and Package (Windows)
    runs-on: windows-latest
    needs: review
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.3"
          arch: "win64_msvc2022_64"

      - name: Package app
        shell: pwsh
        run: |
          & "./Visualization for Hexo/scripts/package.ps1" -Configuration Release -Platform x64 -Toolset v143

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualization-for-Hexo-Release-x64
          path: Visualization for Hexo/dist/Visualization-for-Hexo-Release-x64.zip
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: windows-latest
    needs: package
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: Visualization-for-Hexo-Release-x64
          path: release

      - name: Build release metadata
        id: meta
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          "tag=auto-${{ github.run_id }}-${{ github.run_attempt }}" >> $env:GITHUB_OUTPUT
          "name=Auto Release #${{ github.run_number }} ($shortSha)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          generate_release_notes: true
          files: release/*.zip
