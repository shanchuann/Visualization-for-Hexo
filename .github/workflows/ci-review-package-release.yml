name: CI Review Package Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  QT_VERSION: "6.9.3"
  QT_ARCH: "win64_msvc2022_64"

jobs:
  review:
    name: Static Review (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability --std=c++17 --library=qt --error-exitcode=1 --inline-suppr --suppress=missingIncludeSystem --suppress=unknownMacro --quiet "Visualization for Hexo/src" "Visualization for Hexo/main.cpp"

  package:
    name: Build and Package (Windows)
    runs-on: windows-latest
    needs: review
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ env.QT_ARCH }}
          modules: "qtwebengine qtwebchannel qtpositioning"
          cache: true

      - name: Resolve Qt root
        shell: pwsh
        run: |
          if ($env:Qt6_DIR) {
            $qtRoot = Resolve-Path (Join-Path $env:Qt6_DIR "..\\..\\..")
            "QT_ROOT_DIR=$qtRoot" >> $env:GITHUB_ENV
          }

      - name: Package app
        shell: pwsh
        run: |
          & "./Visualization for Hexo/scripts/package.ps1" -Configuration Release -Platform x64 -Toolset v143 -Clean

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualization-for-Hexo-Release-x64
          path: Visualization for Hexo/dist/Visualization-for-Hexo-Release-x64.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    runs-on: windows-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: Visualization-for-Hexo-Release-x64
          path: release

      - name: Build release metadata
        id: meta
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref.StartsWith("refs/tags/")) {
            $tag = "${{ github.ref_name }}"
            $name = "Release $tag"
          } else {
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            $tag = "auto-${{ github.run_id }}-${{ github.run_attempt }}"
            $name = "Auto Release #${{ github.run_number }} ($shortSha)"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          files: release/*.zip
